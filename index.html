<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – RHU Rizal Appointment System</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-icon"><i class="fa-solid fa-hospital-user"></i></div>
          <h2>RHU Rizal<br />Appointment System</h2>
          <p>Rural Health Unit – Municipality of Rizal</p>
        </div>

        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-group">
              <i class="fa-solid fa-user input-icon"></i>
              <input
                type="text"
                class="form-control"
                id="username"
                placeholder="Enter your username"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-group">
              <i class="fa-solid fa-lock input-icon"></i>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Enter your password"
              />
              <i
                class="fa-solid fa-eye input-icon-right"
                id="togglePwd"
                style="pointer-events: all"
              ></i>
            </div>
          </div>

          <div class="flex-between mb-2">
            <label
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                cursor: pointer;
              "
            >
              <input type="checkbox" id="rememberMe" /> Remember me
            </label>
            <a
              href="#"
              class="link-primary"
              style="font-size: 13px"
              onclick="
                openModal('forgotModal');
                return false;
              "
            >
              Forgot Password?
            </a>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block btn-lg"
            id="loginBtn"
          >
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
          </button>

          <div class="section-divider mt-3">or</div>

          <a
            href="views/user/signup.html"
            class="btn btn-outline-primary btn-block"
            style="text-align: center; justify-content: center"
          >
            <i class="fa-solid fa-user-plus"></i> Create New Account
          </a>

          <div class="text-center mt-2">
            <a
              href="views/admin/login.html"
              class="link-primary"
              style="font-size: 12px"
            >
              <i class="fa-solid fa-shield-halved"></i> Admin Login
            </a>
          </div>
        </form>

        <div class="alert alert-info mt-3" style="margin-bottom: 0">
          <i class="fa-solid fa-circle-info"></i>
          <div>
            <strong>Demo Credentials:</strong><br />
            Username: <code>juandc</code> &nbsp; Password:
            <code>patient123</code>
          </div>
        </div>
      </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotModal">
      <div class="modal-box sm">
        <div class="modal-header">
          <h5><i class="fa-solid fa-key"></i> Forgot Password</h5>
          <button class="modal-close" data-modal-close="forgotModal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="modal-body">
          <p style="font-size: 13.5px; color: #555; margin-bottom: 16px">
            Enter your registered email address and we'll send you a password
            reset link.
          </p>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <i class="fa-solid fa-envelope input-icon"></i>
              <input
                type="email"
                class="form-control"
                placeholder="your@email.com"
              />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-modal-close="forgotModal">
            Cancel
          </button>
          <button
            class="btn btn-primary"
            onclick="
              showToast(
                'Password reset link sent! (Prototype – UI only)',
                'info',
              );
              closeModal('forgotModal');
            "
          >
            <i class="fa-solid fa-paper-plane"></i> Send Reset Link
          </button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="data/mockData.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      // Redirect if already logged in
      const session = DB.getSession();
      if (session) {
        window.location.href =
          session.role === "admin"
            ? "views/admin/dashboard.html"
            : "views/user/dashboard.html";
      }

      // Toggle password visibility
      document.getElementById("togglePwd")?.addEventListener("click", () => {
        const pwd = document.getElementById("password");
        const icon = document.getElementById("togglePwd");
        if (pwd.type === "password") {
          pwd.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          pwd.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      });

      // Login form
      document.getElementById("loginForm")?.addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn = document.getElementById("loginBtn");

        if (!username || !password) {
          showToast("Please enter username and password.", "warning");
          return;
        }

        btn.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
        btn.disabled = true;

        setTimeout(() => {
          const patients = DB.getPatients();
          const patient = patients.find(
            (p) => p.username === username && p.password === password,
          );

          if (patient) {
            DB.setSession({ ...patient, role: "user" });
            showToast(`Welcome back, ${patient.fullName}!`, "success");
            setTimeout(
              () => (window.location.href = "views/user/dashboard.html"),
              900,
            );
          } else {
            showToast("Invalid username or password.", "error");
            btn.innerHTML =
              '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
            btn.disabled = false;
          }
        }, 900);
      });
    </script>
  </body>
</html>
