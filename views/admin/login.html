<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – RHU Rizal</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-icon" style="background: #1a202c; color: #fff">
            <i class="fa-solid fa-shield-halved"></i>
          </div>
          <h2>Admin Portal</h2>
          <p>RHU Rizal – System Administrator</p>
        </div>

        <form id="adminLoginForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label">Admin Username</label>
            <div class="input-group">
              <i class="fa-solid fa-user-shield input-icon"></i>
              <input
                type="text"
                class="form-control"
                id="adminUsername"
                placeholder="admin"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-group">
              <i class="fa-solid fa-lock input-icon"></i>
              <input
                type="password"
                class="form-control"
                id="adminPassword"
                placeholder="••••••••"
              />
              <i
                class="fa-solid fa-eye input-icon-right"
                id="toggleAdminPwd"
                style="pointer-events: all"
              ></i>
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block btn-lg"
            id="adminLoginBtn"
            style="margin-top: 4px"
          >
            <i class="fa-solid fa-right-to-bracket"></i> Sign In as Admin
          </button>

          <div class="text-center mt-2">
            <a
              href="../../index.html"
              class="link-primary"
              style="font-size: 12px"
            >
              <i class="fa-solid fa-arrow-left"></i> Back to Patient Login
            </a>
          </div>
        </form>

        <div class="alert alert-warning mt-3" style="margin-bottom: 0">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <div>
            <strong>Demo Credentials:</strong><br />
            Username: <code>admin</code> &nbsp; Password: <code>admin123</code>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="../../data/mockData.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
      // Redirect if already admin session
      const session = DB.getSession();
      if (session && session.role === "admin") {
        window.location.href = "dashboard.html";
      }

      document
        .getElementById("toggleAdminPwd")
        ?.addEventListener("click", () => {
          const pwd = document.getElementById("adminPassword");
          const icon = document.getElementById("toggleAdminPwd");
          if (pwd.type === "password") {
            pwd.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
          } else {
            pwd.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
          }
        });

      document
        .getElementById("adminLoginForm")
        ?.addEventListener("submit", (e) => {
          e.preventDefault();
          const username = document
            .getElementById("adminUsername")
            .value.trim();
          const password = document
            .getElementById("adminPassword")
            .value.trim();
          const btn = document.getElementById("adminLoginBtn");

          if (!username || !password) {
            showToast("Please enter credentials.", "warning");
            return;
          }

          btn.innerHTML =
            '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
          btn.disabled = true;

          setTimeout(() => {
            const admin = RHU_DATA.adminUser;
            if (username === admin.username && password === admin.password) {
              DB.setSession({
                id: "ADMIN-001",
                fullName: admin.name,
                name: admin.name,
                email: admin.email,
                role: "admin",
                username: admin.username,
              });
              showToast(`Welcome, ${admin.name}!`, "success");
              setTimeout(() => (window.location.href = "dashboard.html"), 900);
            } else {
              showToast("Invalid admin credentials.", "error");
              btn.innerHTML =
                '<i class="fa-solid fa-right-to-bracket"></i> Sign In as Admin';
              btn.disabled = false;
            }
          }, 900);
        });
    </script>
  </body>
</html>
