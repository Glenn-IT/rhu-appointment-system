<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up – RHU Rizal Appointment System</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      .auth-card {
        max-width: 600px;
      }
      .step-indicator {
        display: flex;
        justify-content: center;
        gap: 0;
        margin-bottom: 28px;
      }
      .step {
        display: flex;
        align-items: center;
        gap: 0;
      }
      .step-circle {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        background: var(--gray-200);
        color: var(--gray-500);
        border: 2px solid var(--gray-300);
        transition: var(--transition);
      }
      .step.active .step-circle {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .step.done .step-circle {
        background: var(--secondary);
        color: #fff;
        border-color: var(--secondary);
      }
      .step-line {
        width: 50px;
        height: 2px;
        background: var(--gray-300);
      }
      .step.done + .step .step-line {
        background: var(--secondary);
      }
      .step-label {
        font-size: 11px;
        color: var(--gray-500);
        text-align: center;
        margin-top: 6px;
      }
      .step-block {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-icon"><i class="fa-solid fa-user-plus"></i></div>
          <h2>Create Account</h2>
          <p>Register as a patient of RHU Rizal</p>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator">
          <div class="step-block">
            <div class="step active" id="step1Indicator">
              <div class="step-circle">1</div>
            </div>
            <div class="step-label">Personal Info</div>
          </div>
          <div class="step-line" style="margin-top: 15px"></div>
          <div class="step-block">
            <div class="step" id="step2Indicator">
              <div class="step-circle">2</div>
            </div>
            <div class="step-label">Account Setup</div>
          </div>
          <div class="step-line" style="margin-top: 15px"></div>
          <div class="step-block">
            <div class="step" id="step3Indicator">
              <div class="step-circle">3</div>
            </div>
            <div class="step-label">Done</div>
          </div>
        </div>

        <!-- Step 1: Personal Info -->
        <div id="step1">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name *</label>
              <input
                type="text"
                class="form-control"
                id="firstName"
                placeholder="Juan"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Last Name *</label>
              <input
                type="text"
                class="form-control"
                id="lastName"
                placeholder="Dela Cruz"
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Date of Birth *</label>
              <input type="date" class="form-control" id="birthdate" />
            </div>
            <div class="form-group">
              <label class="form-label">Gender *</label>
              <select class="form-select" id="gender">
                <option value="">-- Select --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Phone Number *</label>
              <div class="input-group">
                <i class="fa-solid fa-phone input-icon"></i>
                <input
                  type="tel"
                  class="form-control"
                  id="phone"
                  placeholder="09XXXXXXXXX"
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Blood Type</label>
              <select class="form-select" id="bloodType">
                <option value="">-- Select --</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>O+</option>
                <option>O-</option>
                <option>AB+</option>
                <option>AB-</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Complete Address *</label>
            <input
              type="text"
              class="form-control"
              id="address"
              placeholder="Brgy., Municipality, Province"
            />
          </div>
          <button class="btn btn-primary btn-block" onclick="goToStep2()">
            Next <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>

        <!-- Step 2: Account Setup -->
        <div id="step2" style="display: none">
          <div class="form-group">
            <label class="form-label">Email Address *</label>
            <div class="input-group">
              <i class="fa-solid fa-envelope input-icon"></i>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="you@email.com"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Username *</label>
            <div class="input-group">
              <i class="fa-solid fa-user input-icon"></i>
              <input
                type="text"
                class="form-control"
                id="regUsername"
                placeholder="Choose a username"
              />
            </div>
            <p class="form-hint">
              Username must be at least 4 characters, no spaces.
            </p>
          </div>
          <div class="form-group">
            <label class="form-label">Password *</label>
            <div class="input-group">
              <i class="fa-solid fa-lock input-icon"></i>
              <input
                type="password"
                class="form-control"
                id="regPassword"
                placeholder="At least 8 characters"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password *</label>
            <div class="input-group">
              <i class="fa-solid fa-shield-halved input-icon"></i>
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                placeholder="Repeat password"
              />
            </div>
          </div>
          <div class="form-group">
            <label
              style="
                display: flex;
                align-items: flex-start;
                gap: 10px;
                font-size: 13px;
                cursor: pointer;
              "
            >
              <input type="checkbox" id="agreeTerms" style="margin-top: 3px" />
              I agree to the Terms & Conditions and Privacy Policy of RHU Rizal
            </label>
          </div>
          <div class="flex-gap">
            <button class="btn btn-secondary" onclick="goToStep1()">
              <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button
              class="btn btn-primary"
              style="flex: 1"
              onclick="submitSignup()"
            >
              <i class="fa-solid fa-user-check"></i> Create Account
            </button>
          </div>
        </div>

        <!-- Step 3: Success -->
        <div id="step3" style="display: none; text-align: center">
          <div
            style="
              font-size: 60px;
              color: var(--secondary);
              margin-bottom: 16px;
            "
          >
            <i class="fa-solid fa-circle-check"></i>
          </div>
          <h3
            style="font-size: 20px; color: var(--gray-800); margin-bottom: 8px"
          >
            Account Created!
          </h3>
          <p
            style="color: var(--gray-500); font-size: 14px; margin-bottom: 24px"
          >
            Your account has been successfully registered.<br />
            You can now log in and book appointments.
          </p>
          <a href="../../index.html" class="btn btn-primary btn-block">
            <i class="fa-solid fa-right-to-bracket"></i> Go to Login
          </a>
        </div>

        <p class="text-center mt-2" style="font-size: 13px" id="loginLink">
          Already have an account?
          <a href="../../index.html" class="link-primary">Sign In</a>
        </p>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="../../data/mockData.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
      function goToStep2() {
        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const birthdate = document.getElementById("birthdate").value;
        const gender = document.getElementById("gender").value;
        const phone = document.getElementById("phone").value.trim();
        const address = document.getElementById("address").value.trim();

        if (
          !firstName ||
          !lastName ||
          !birthdate ||
          !gender ||
          !phone ||
          !address
        ) {
          showToast("Please fill in all required fields.", "warning");
          return;
        }

        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
        document.getElementById("step1Indicator").classList.remove("active");
        document.getElementById("step1Indicator").classList.add("done");
        document.getElementById("step2Indicator").classList.add("active");
      }

      function goToStep1() {
        document.getElementById("step2").style.display = "none";
        document.getElementById("step1").style.display = "block";
        document.getElementById("step2Indicator").classList.remove("active");
        document.getElementById("step1Indicator").classList.remove("done");
        document.getElementById("step1Indicator").classList.add("active");
      }

      function submitSignup() {
        const email = document.getElementById("email").value.trim();
        const username = document.getElementById("regUsername").value.trim();
        const password = document.getElementById("regPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;
        const agree = document.getElementById("agreeTerms").checked;

        if (!email || !username || !password || !confirmPassword) {
          showToast("Please fill in all required fields.", "warning");
          return;
        }
        if (username.length < 4 || username.includes(" ")) {
          showToast(
            "Username must be at least 4 characters and no spaces.",
            "warning",
          );
          return;
        }
        if (password.length < 8) {
          showToast("Password must be at least 8 characters.", "warning");
          return;
        }
        if (password !== confirmPassword) {
          showToast("Passwords do not match.", "error");
          return;
        }
        if (!agree) {
          showToast("You must agree to the Terms & Conditions.", "warning");
          return;
        }

        // Check username taken
        const patients = DB.getPatients();
        if (patients.find((p) => p.username === username)) {
          showToast("Username is already taken.", "error");
          return;
        }

        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const birthdate = document.getElementById("birthdate").value;
        const gender = document.getElementById("gender").value;
        const phone = document.getElementById("phone").value.trim();
        const address = document.getElementById("address").value.trim();
        const bloodType = document.getElementById("bloodType").value;

        const newPatient = {
          id: `P-${String(patients.length + 1).padStart(3, "0")}`,
          fullName: `${firstName} ${lastName}`,
          username,
          password,
          email,
          phone,
          address,
          birthdate,
          gender,
          bloodType: bloodType || "Unknown",
          status: "Active",
          registeredDate: new Date().toISOString().split("T")[0],
        };

        patients.push(newPatient);
        DB.savePatients(patients);

        // Show step 3
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "block";
        document.getElementById("loginLink").style.display = "none";
        document.getElementById("step2Indicator").classList.remove("active");
        document.getElementById("step2Indicator").classList.add("done");
        document.getElementById("step3Indicator").classList.add("active");
        showToast("Account created successfully!", "success");
      }
    </script>
  </body>
</html>
